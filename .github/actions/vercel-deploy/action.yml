name: Vercel Deploy
description: Build and deploy to Vercel using CLI v54+ prebuilt flow

inputs:
  vercel-token:
    description: Vercel API token
    required: true
  vercel-org-id:
    description: Vercel organisation ID
    required: true
  vercel-project-id:
    description: Vercel project ID
    required: true
  vercel-version:
    description: Vercel CLI version to pin
    default: '54.14.0'
  environment:
    description: 'preview | production'
    default: 'preview'
  branch-ref:
    description: Full git ref (github.ref) — used to auto-promote main to production
    default: ''

outputs:
  url:
    description: Deployed Vercel URL
    value: ${{ steps.deploy.outputs.url }}

runs:
  using: composite
  steps:
    - name: Cache Vercel CLI
      uses: actions/cache@v4
      id: vercel-cache
      with:
        path: ~/.npm-global
        key: vercel-cli-${{ inputs.vercel-version }}

    - name: Install Vercel CLI
      if: steps.vercel-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        npm install --global --prefix ~/.npm-global vercel@${{ inputs.vercel-version }}

    - name: Add Vercel CLI to PATH
      shell: bash
      run: echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

    - name: Pull Vercel environment & project settings
      shell: bash
      env:
        VERCEL_TOKEN: ${{ inputs.vercel-token }}
        VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}
      run: vercel pull --yes --environment=${{ inputs.environment }} --token="$VERCEL_TOKEN"

    - name: Build via Vercel
      shell: bash
      env:
        VERCEL_TOKEN: ${{ inputs.vercel-token }}
        VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}
      run: |
        if [[ "${{ inputs.branch-ref }}" == "refs/heads/main" ]]; then
          vercel build --prod --token="$VERCEL_TOKEN"
        else
          vercel build --token="$VERCEL_TOKEN"
        fi

    - name: Deploy prebuilt output
      id: deploy
      shell: bash
      env:
        VERCEL_TOKEN: ${{ inputs.vercel-token }}
        VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}
      run: |
        PROD_FLAG=""
        if [[ "${{ inputs.branch-ref }}" == "refs/heads/main" ]]; then
          PROD_FLAG="--prod"
        fi
        URL=$(vercel deploy --prebuilt $PROD_FLAG --token="$VERCEL_TOKEN" 2>&1 | tail -1)
        echo "url=$URL" >> "$GITHUB_OUTPUT"
        echo "Deployed: $URL"

    - name: Write summary
      shell: bash
      run: |
        echo "### Vercel deployment" >> "$GITHUB_STEP_SUMMARY"
        echo "**URL:** ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
        echo "**Environment:** ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
