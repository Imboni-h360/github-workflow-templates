name: Vercel Deploy
description: Build React static files and deploy to Vercel

inputs:
  vercel-token:
    description: Vercel API token
    required: true
  vercel-org-id:
    description: Vercel organisation ID
    required: true
  vercel-project-id:
    description: Vercel project ID
    required: true
  build-command:
    description: Build command to run before deploy
    default: 'npm run build'
  output-dir:
    description: Directory containing built static files
    default: 'dist'
  environment:
    description: 'preview | production'
    default: 'preview'
  branch-ref:
    description: Full git ref (github.ref) — used to auto-promote main to production
    default: ''

outputs:
  url:
    description: Deployed Vercel URL
    value: ${{ steps.deploy.outputs.url }}

runs:
  using: composite
  steps:
    - name: Install Vercel CLI
      shell: bash
      run: npm install --global vercel@latest

    - name: Build
      shell: bash
      run: ${{ inputs.build-command }}

    - name: Pull Vercel environment
      shell: bash
      env:
        VERCEL_TOKEN: ${{ inputs.vercel-token }}
        VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}
      run: vercel pull --yes --environment=${{ inputs.environment }} --token="$VERCEL_TOKEN"

    - name: Deploy to Vercel
      id: deploy
      shell: bash
      env:
        VERCEL_TOKEN: ${{ inputs.vercel-token }}
        VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}
      run: |
        PROD_FLAG=""
        if [[ "${{ inputs.branch-ref }}" == "refs/heads/main" ]]; then
          PROD_FLAG="--prod"
        fi
        URL=$(vercel deploy ${{ inputs.output-dir }} $PROD_FLAG --token="$VERCEL_TOKEN" 2>&1 | tail -1)
        echo "url=$URL" >> "$GITHUB_OUTPUT"
        echo "Deployed: $URL"

    - name: Write summary
      shell: bash
      run: |
        echo "### Vercel deployment" >> "$GITHUB_STEP_SUMMARY"
        echo "**URL:** ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
        echo "**Environment:** ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
