name: Gitleaks Secret Scan
description: Detect secrets with Gitleaks

inputs:
  version:
    description: Gitleaks CLI version
    default: '8.30.1'
  exit-code:
    description: Exit code when leaks are found
    default: '1'
  config-path:
    description: Path to .gitleaks.toml config (for allowlisting false positives)
    default: '.gitleaks.toml'

runs:
  using: composite
  steps:
    - name: Install Gitleaks
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
          -O /tmp/gitleaks.tar.gz
        tar -xzf /tmp/gitleaks.tar.gz -C /tmp
        sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
        gitleaks version

    - name: Run Gitleaks
      shell: bash
      run: |
        CONFIG_FLAG=""
        if [ -f "${{ inputs.config-path }}" ]; then
          CONFIG_FLAG="--config=${{ inputs.config-path }}"
        fi
        gitleaks detect --source . --redact --verbose $CONFIG_FLAG --exit-code ${{ inputs.exit-code }}
