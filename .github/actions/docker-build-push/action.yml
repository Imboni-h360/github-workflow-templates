name: Docker Build & Push
description: Build multi-platform Docker image and push to Docker Hub

inputs:
  image-name:
    description: Docker Hub image name (without username prefix)
    required: true
  dockerhub-username:
    description: Docker Hub username
    required: true
  dockerhub-token:
    description: Docker Hub access token
    required: true
  context:
    description: Docker build context path
    default: '.'
  dockerfile:
    description: Path to Dockerfile
    default: './Dockerfile'
  platforms:
    description: Target platforms
    default: 'linux/amd64,linux/arm64'
  image-title:
    description: OCI image title label
    required: true
  image-vendor:
    description: OCI image vendor label
    default: 'IMBONI Health'
  run-number:
    description: GitHub run number for tag suffixes
    required: true
  branch-ref:
    description: Full git ref (github.ref)
    required: true
  sha:
    description: Git commit SHA
    required: true

outputs:
  tags:
    description: Pushed image tags
    value: ${{ steps.meta.outputs.tags }}

runs:
  using: composite
  steps:
    - name: Get build date
      id: date
      shell: bash
      run: echo "tag=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}

    - name: Generate Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ inputs.dockerhub-username }}/${{ inputs.image-name }}
        tags: |
          type=raw,value=develop,enable=${{ inputs.branch-ref == 'refs/heads/develop' }}
          type=raw,value=develop-${{ steps.date.outputs.tag }}.${{ inputs.run-number }},enable=${{ inputs.branch-ref == 'refs/heads/develop' }}
          type=raw,value=uat,enable=${{ inputs.branch-ref == 'refs/heads/uat' }}
          type=raw,value=uat-${{ steps.date.outputs.tag }}.${{ inputs.run-number }},enable=${{ inputs.branch-ref == 'refs/heads/uat' }}
          type=raw,value=latest,enable=${{ inputs.branch-ref == 'refs/heads/main' }}
          type=raw,value=${{ steps.date.outputs.tag }}.${{ inputs.run-number }},enable=${{ inputs.branch-ref == 'refs/heads/main' }}
        labels: |
          org.opencontainers.image.title=${{ inputs.image-title }}
          org.opencontainers.image.vendor=${{ inputs.image-vendor }}
          org.opencontainers.image.revision=${{ inputs.sha }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ inputs.dockerhub-username }}/${{ inputs.image-name }}:buildcache
        cache-to: type=registry,ref=${{ inputs.dockerhub-username }}/${{ inputs.image-name }}:buildcache,mode=max

    - name: Write summary
      shell: bash
      run: |
        echo "### Docker image pushed to Docker Hub" >> "$GITHUB_STEP_SUMMARY"
        echo "**Repo:** \`${{ inputs.dockerhub-username }}/${{ inputs.image-name }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "**Tags:**" >> "$GITHUB_STEP_SUMMARY"
        echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
        echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
        echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
