name: React CI → Nginx Server (reusable)

on:
  workflow_call:
    inputs:
      node-version-file:
        description: Path to .nvmrc or .node-version
        type: string
        default: '.nvmrc'
      install-args:
        description: Extra flags for npm ci
        type: string
        default: '--prefer-offline --legacy-peer-deps'
      build-command:
        description: Build command
        type: string
        default: 'npm run build'
      output-dir:
        description: Static build output directory
        type: string
        default: 'dist'
      run-tests:
        description: Whether to run unit tests
        type: boolean
        default: true
      security-scan:
        description: Whether to run secret + npm audit checks
        type: boolean
        default: true
      server-user:
        description: SSH user on the target server
        type: string
        default: 'root'
      nginx-root:
        description: Absolute path to Nginx web root on the server
        type: string
        default: '/var/www/h360-frontend'
      setup-nginx:
        description: Whether to create/update Nginx config on the server
        type: boolean
        default: false
      nginx-domain:
        description: Domain for the Nginx server block (e.g. h360.imboni.co.rw)
        type: string
        default: ''
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SERVER_HOST:
        required: true
      # Vite build-time env vars — baked into the JS bundle at build time
      VITE_API_BASE_URL:
        required: false
      VITE_API_URL:
        required: false
      VITE_GOOGLE_MAPS_API_KEY:
        required: false
      VITE_CLINIC_WEB_URL:
        required: false
      VITE_BOOKING_IFRAME_URL:
        required: false
      VITE_PORTAL_URL:
        required: false
      VITE_CLINIC_ID:
        required: false
      VITE_CLINIC_WEB_PANEL_URL:
        required: false

permissions:
  contents: read

jobs:
  # ── 1. Secret scan ──────────────────────────────────────────────────────────
  secrets:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    if: inputs.security-scan
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: Imboni-h360/github-workflow-templates/.github/actions/gitleaks-scan@main

  # ── 2. npm audit ────────────────────────────────────────────────────────────
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    needs: secrets
    if: always() && (needs.secrets.result == 'success' || needs.secrets.result == 'skipped')
    steps:
      - uses: actions/checkout@v5

      - uses: Imboni-h360/github-workflow-templates/.github/actions/setup-node@main
        with:
          node-version-file: ${{ inputs.node-version-file }}
          install-args: ${{ inputs.install-args }}

      - name: npm audit (production)
        run: |
          RESULT=$(npm audit --omit=dev --json 2>/dev/null || true)
          HIGH=$(echo "$RESULT" | jq '[
            .vulnerabilities // {} | to_entries[]
            | select(.value.severity == "high" or .value.severity == "critical")
            | select((.value.fixAvailable | type) == "boolean" and .value.fixAvailable == true)
          ] | length')
          if [[ $HIGH -gt 0 ]]; then
            echo "❌ $HIGH HIGH/CRITICAL with safe fix — run npm audit fix"
            exit 1
          fi
          echo "✅ No safely-fixable HIGH/CRITICAL"

  # ── 3. TypeScript check ─────────────────────────────────────────────────────
  typescript:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: Imboni-h360/github-workflow-templates/.github/actions/setup-node@main
        with:
          node-version-file: ${{ inputs.node-version-file }}
          install-args: ${{ inputs.install-args }}

      - run: npx tsc --noEmit

  # ── 4. Unit tests ───────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: inputs.run-tests
    steps:
      - uses: actions/checkout@v5

      - uses: Imboni-h360/github-workflow-templates/.github/actions/setup-node@main
        with:
          node-version-file: ${{ inputs.node-version-file }}
          install-args: ${{ inputs.install-args }}

      - run: npm test -- --passWithNoTests

  # ── 5. Gate ──────────────────────────────────────────────────────────────────
  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [secrets, npm-audit, typescript, test]
    if: always()
    steps:
      - name: Evaluate
        run: |
          echo "secrets:    ${{ needs.secrets.result }}"
          echo "npm-audit:  ${{ needs.npm-audit.result }}"
          echo "typescript: ${{ needs.typescript.result }}"
          echo "test:       ${{ needs.test.result }}"

          FAIL=0
          [[ "${{ needs.secrets.result }}"    == "failure" ]] && FAIL=1
          [[ "${{ needs.npm-audit.result }}"  == "failure" ]] && FAIL=1
          [[ "${{ needs.typescript.result }}" != "success" ]] && FAIL=1
          [[ "${{ needs.test.result }}"       == "failure" ]] && FAIL=1

          if [[ $FAIL -eq 1 ]]; then echo "❌ CI GATE FAILED"; exit 1; fi
          echo "✅ CI GATE PASSED"

  # ── 6. Build & Deploy to Nginx server via SSH ────────────────────────────────
  deploy:
    name: Deploy → Nginx Server
    runs-on: ubuntu-latest
    needs: gate
    if: always() && needs.gate.result == 'success'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: Imboni-h360/github-workflow-templates/.github/actions/setup-node@main
        with:
          node-version-file: ${{ inputs.node-version-file }}
          install-args: ${{ inputs.install-args }}

      - name: Write production .env
        run: |
          {
            echo "VITE_ENV=production"
            echo "VITE_ENABLE_PWA=true"
            echo "VITE_ENABLE_ANALYTICS=false"
            [ -n "$VITE_API_BASE_URL" ]      && echo "VITE_API_BASE_URL=$VITE_API_BASE_URL"
            [ -n "$VITE_API_URL" ]           && echo "VITE_API_URL=$VITE_API_URL"
            [ -n "$VITE_GOOGLE_MAPS_API_KEY" ] && echo "VITE_GOOGLE_MAPS_API_KEY=$VITE_GOOGLE_MAPS_API_KEY"
            [ -n "$VITE_CLINIC_WEB_URL" ]    && echo "VITE_CLINIC_WEB_URL=$VITE_CLINIC_WEB_URL"
            [ -n "$VITE_BOOKING_IFRAME_URL" ] && echo "VITE_BOOKING_IFRAME_URL=$VITE_BOOKING_IFRAME_URL"
            [ -n "$VITE_PORTAL_URL" ]        && echo "VITE_PORTAL_URL=$VITE_PORTAL_URL"
            [ -n "$VITE_CLINIC_ID" ]             && echo "VITE_CLINIC_ID=$VITE_CLINIC_ID"
            [ -n "$VITE_CLINIC_WEB_PANEL_URL" ]  && echo "VITE_CLINIC_WEB_PANEL_URL=$VITE_CLINIC_WEB_PANEL_URL"
          } > .env
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_CLINIC_WEB_URL: ${{ secrets.VITE_CLINIC_WEB_URL }}
          VITE_BOOKING_IFRAME_URL: ${{ secrets.VITE_BOOKING_IFRAME_URL }}
          VITE_PORTAL_URL: ${{ secrets.VITE_PORTAL_URL }}
          VITE_CLINIC_ID: ${{ secrets.VITE_CLINIC_ID }}
          VITE_CLINIC_WEB_PANEL_URL: ${{ secrets.VITE_CLINIC_WEB_PANEL_URL }}

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Setup SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          HOST=$(echo "$SERVER_HOST" | tr -d '[:space:]')
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Setup Nginx config
        if: inputs.setup-nginx && inputs.nginx-domain != ''
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          HOST=$(echo "$SERVER_HOST" | tr -d '[:space:]')
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ inputs.server-user }}@${HOST} "
            mkdir -p ${{ inputs.nginx-root }}
            cat > /etc/nginx/sites-available/${{ inputs.nginx-domain }} << 'NGINXEOF'
          server {
              listen 80;
              server_name ${{ inputs.nginx-domain }};
              root ${{ inputs.nginx-root }};
              index index.html;
              location / {
                  try_files \$uri \$uri/ /index.html;
              }
              location /assets/ {
                  expires 1y;
                  add_header Cache-Control \"public, immutable\";
              }
              gzip on;
              gzip_types text/css application/javascript application/json image/svg+xml;
          }
          NGINXEOF
            ln -sf /etc/nginx/sites-available/${{ inputs.nginx-domain }} /etc/nginx/sites-enabled/
            nginx -t && systemctl reload nginx
            # Auto-provision SSL if certbot is installed and cert doesn't exist yet
            if command -v certbot &>/dev/null && [ ! -d /etc/letsencrypt/live/${{ inputs.nginx-domain }} ]; then
              certbot --nginx -d ${{ inputs.nginx-domain }} --non-interactive --agree-tos -m admin@imboni.co.rw
            fi
          "

      - name: Rsync dist to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          HOST=$(echo "$SERVER_HOST" | tr -d '[:space:]')
          rsync -az --delete -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" ${{ inputs.output-dir }}/ ${{ inputs.server-user }}@${HOST}:${{ inputs.nginx-root }}/

      - name: Reload Nginx
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          HOST=$(echo "$SERVER_HOST" | tr -d '[:space:]')
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ inputs.server-user }}@${HOST} "nginx -t && systemctl reload nginx"

      - name: Write summary
        run: |
          echo "### Server deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "**Host:** ${{ secrets.SERVER_HOST }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Path:** ${{ inputs.nginx-root }}" >> "$GITHUB_STEP_SUMMARY"
