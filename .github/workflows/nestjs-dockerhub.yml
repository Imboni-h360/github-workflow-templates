name: NestJS CI → Docker Hub (reusable)

on:
  workflow_call:
    inputs:
      image-name:
        description: Docker Hub image name (without username prefix)
        type: string
        required: true
      image-title:
        description: OCI image title label
        type: string
        required: true
      image-vendor:
        description: OCI image vendor label
        type: string
        default: 'IMBONI Health'
      node-version-file:
        description: Path to .nvmrc or .node-version
        type: string
        default: '.nvmrc'
      install-args:
        description: Extra flags for npm ci
        type: string
        default: '--prefer-offline --legacy-peer-deps'
      platforms:
        description: Docker target platforms
        type: string
        default: 'linux/amd64,linux/arm64'
      run-tests:
        description: Whether to run unit tests
        type: boolean
        default: true
      security-scan:
        description: Whether to run the security scan jobs
        type: boolean
        default: true
      event-name:
        description: github.event_name from the caller (push, pull_request, etc.)
        type: string
        default: 'push'
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: read
  security-events: write

concurrency:
  group: nestjs-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  # ── 1. Secret scan ──────────────────────────────────────────────────────────
  secrets:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    if: inputs.security-scan
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: Imboni-h360/github-workflow-templates/.github/actions/gitleaks-scan@main

  # ── 2. npm audit ────────────────────────────────────────────────────────────
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    needs: secrets
    if: always() && (needs.secrets.result == 'success' || needs.secrets.result == 'skipped')
    steps:
      - uses: actions/checkout@v5

      - uses: Imboni-h360/github-workflow-templates/.github/actions/setup-node@main
        with:
          node-version-file: ${{ inputs.node-version-file }}
          install-args: ${{ inputs.install-args }}

      - name: npm audit (production)
        run: |
          RESULT=$(npm audit --omit=dev --json 2>/dev/null || true)
          HIGH=$(echo "$RESULT" | jq '[
            .vulnerabilities // {} | to_entries[]
            | select(.value.severity == "high" or .value.severity == "critical")
            | select((.value.fixAvailable | type) == "boolean" and .value.fixAvailable == true)
          ] | length')
          if [[ $HIGH -gt 0 ]]; then
            echo "❌ $HIGH HIGH/CRITICAL with safe fix — run npm audit fix"
            exit 1
          fi
          echo "✅ No safely-fixable HIGH/CRITICAL"

  # ── 3. TypeScript check ─────────────────────────────────────────────────────
  typescript:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: Imboni-h360/github-workflow-templates/.github/actions/setup-node@main
        with:
          node-version-file: ${{ inputs.node-version-file }}
          install-args: ${{ inputs.install-args }}

      - run: npx tsc --noEmit

  # ── 4. Unit tests ───────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: inputs.run-tests
    steps:
      - uses: actions/checkout@v5

      - uses: Imboni-h360/github-workflow-templates/.github/actions/setup-node@main
        with:
          node-version-file: ${{ inputs.node-version-file }}
          install-args: ${{ inputs.install-args }}

      - run: npm test -- --passWithNoTests

  # ── 5. Build ─────────────────────────────────────────────────────────────────
  build:
    name: NestJS Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: Imboni-h360/github-workflow-templates/.github/actions/setup-node@main
        with:
          node-version-file: ${{ inputs.node-version-file }}
          install-args: ${{ inputs.install-args }}

      - run: npm run build

  # ── 6. Gate ──────────────────────────────────────────────────────────────────
  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [secrets, npm-audit, typescript, test, build]
    if: always()
    steps:
      - name: Evaluate
        run: |
          echo "secrets:    ${{ needs.secrets.result }}"
          echo "npm-audit:  ${{ needs.npm-audit.result }}"
          echo "typescript: ${{ needs.typescript.result }}"
          echo "test:       ${{ needs.test.result }}"
          echo "build:      ${{ needs.build.result }}"

          FAIL=0
          [[ "${{ needs.secrets.result }}"    == "failure" ]] && FAIL=1
          [[ "${{ needs.npm-audit.result }}"  == "failure" ]] && FAIL=1
          [[ "${{ needs.typescript.result }}" != "success" ]] && FAIL=1
          [[ "${{ needs.build.result }}"      != "success" ]] && FAIL=1
          [[ "${{ needs.test.result }}"       == "failure" ]] && FAIL=1

          if [[ $FAIL -eq 1 ]]; then echo "❌ CI GATE FAILED"; exit 1; fi
          echo "✅ CI GATE PASSED"

  # ── 7. Docker Build & Push ───────────────────────────────────────────────────
  docker:
    name: Build & Push → Docker Hub
    runs-on: ubuntu-latest
    needs: gate
    if: always() && needs.gate.result == 'success' && inputs.event-name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Build & push image
        uses: Imboni-h360/github-workflow-templates/.github/actions/docker-build-push@main
        with:
          image-name: ${{ inputs.image-name }}
          image-title: ${{ inputs.image-title }}
          image-vendor: ${{ inputs.image-vendor }}
          platforms: ${{ inputs.platforms }}
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          run-number: ${{ github.run_number }}
          branch-ref: ${{ github.ref }}
          sha: ${{ github.sha }}
