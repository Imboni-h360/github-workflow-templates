# Place this file at: H360-backend/.github/workflows/ci.yml
name: CI + Build → Docker Hub (H360-backend)

on:
  push:
    branches: [develop]
  pull_request:
    branches: [uat, main]
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  ci:
    uses: Imboni-h360/github-workflow-templates/.github/workflows/nestjs-dockerhub.yml@main
    with:
      image-name: imboni-h360-backend
      image-title: IMBONI H360 Backend
      image-vendor: IMBONI Health
      node-version-file: '.nvmrc'
      run-tests: true
      security-scan: true
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
